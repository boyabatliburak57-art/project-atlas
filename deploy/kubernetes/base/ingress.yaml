apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: atlas-edge
  annotations:
    atlas.project/edge-policy: tls-waf-request-limits-required
spec:
  ingressClassName: platform-adapter-required
  rules:
    - host: staging.atlas.example
      http:
        paths:
          - backend:
              service:
                name: atlas-web
                port:
                  name: http
            path: /
            pathType: Prefix
    - host: api.staging.atlas.example
      http:
        paths:
          - backend:
              service:
                name: atlas-api
                port:
                  name: http
            path: /
            pathType: Prefix
  tls:
    - hosts:
        - staging.atlas.example
        - api.staging.atlas.example
      secretName: atlas-edge-tls
